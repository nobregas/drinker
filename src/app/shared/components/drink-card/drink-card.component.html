<a [routerLink]="['/drinks', drink().id]" class="drink-card-link">
  <div class="drink-card">
    <div class="drink-image-wrapper">
      <img [src]="drink().image" [alt]="drink().name" class="drink-image" />
      @if (drink().isTrending) {
        <fa-icon [icon]="faFire" class="trending-icon"></fa-icon>
      }
      <div class="card-overlay">
        <div class="overlay-content">
          <fa-icon [icon]="faArrowRight"></fa-icon>
        </div>
      </div>
      <button
        class="wishlist-btn"
        [class.in-wishlist]="isInWishlist()"
        (click)="onWishlistToggle($event)"
        [title]="isInWishlist() ? 'Remover da wishlist' : 'Adicionar à wishlist'"
      >
        <fa-icon [icon]="isInWishlist() ? faHeartSolid : faHeartRegular"></fa-icon>
      </button>
    </div>
    <div class="drink-content">
      <div class="drink-header">
        <h3 class="drink-name">{{ drink().name }}</h3>
        <span class="drink-category">{{ drink().category }}</span>
      </div>
      <div class="drink-stats">
        <div class="drink-rating">
          <fa-icon [icon]="faStar" class="star-icon"></fa-icon>
          <span>{{ drink().rating.toFixed(1) }}</span>
        </div>
        <span class="review-count">({{ drink().reviewCount }})</span>
      </div>
      <div class="drink-footer">
        <div class="price-tag">
          <span class="price-label">R$</span>
          <span class="price-value">{{ drink().price.toFixed(2) }}</span>
        </div>
        <div class="view-hint">
          <span>Ver detalhes</span>
          <fa-icon [icon]="faChevronRight"></fa-icon>
        </div>
      </div>
    </div>
  </div>
</a>
