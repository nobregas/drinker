<div class="drink-card">
  <div class="drink-image-container">
    <img [src]="drink().image" [alt]="drink().name" class="drink-image" />
    @if (drink().isTrending) {
      <span class="trending-badge">Trending</span>
    }
  </div>
  <div class="drink-content">
    <h3 class="drink-name">{{ drink().name }}</h3>
    <p class="drink-category">{{ drink().category }}</p>
    <div class="drink-rating">
      <app-rating [rating]="drink().rating"></app-rating>
      <span class="review-count">{{ drink().reviewCount }} reviews</span>
    </div>
    <div class="drink-footer">
      <span class="drink-price">R$ {{ drink().price.toFixed(2) }}</span>
      <button class="view-details-btn">Ver detalhes</button>
    </div>
  </div>
</div>
